name: chesscoach_ai
description: "Learn chess with AI coaching. Play against smart AI opponents and get real-time feedback."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  stockfish: ^1.0.2
  chess: ^0.8.1
  provider: ^6.0.10
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_animate: ^4.2.0
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.1
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
