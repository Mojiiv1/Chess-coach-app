name: chess_coach
description: "A Flutter chess coaching application powered by Stockfish."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  stockfish: ^1.0.2
  square_bishop: ^0.3.0
  bishop: ^1.4.4
  provider: ^6.0.10
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_animate: ^4.2.0
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
